<!DOCTYPE html>
<html>
<head>
  <title>Secure Document Viewer</title>

  <!-- TensorFlow.js -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

  <!-- COCO-SSD Model -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      overflow: hidden;
    }

    #video {
      position: fixed;
      bottom: 10px;
      right: 10px;
      width: 200px;
      border: 2px solid #00ffcc;
      border-radius: 10px;
    }

    #document {
      width: 100%;
      height: 100vh;
      background: white;
      color: black;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 30px;
    }

    #blocked {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(255,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
      font-size: 40px;
      z-index: 999;
    }

    .watermark {
      position: fixed;
      top: 10px;
      left: 10px;
      opacity: 0.3;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div id="document">
  📄 Secure Document Content
</div>

<div id="blocked">
  🚨 Access Blocked: Phone Detected!
</div>

<div class="watermark">
  User: demo@ownit.in | Time: <span id="time"></span>
</div>

<video id="video" autoplay muted></video>

<script>
let model;
let video = document.getElementById("video");
let blocked = false;

// 🕒 Update watermark time
setInterval(() => {
  document.getElementById("time").innerText = new Date().toLocaleTimeString();
}, 1000);

// 🎥 Start Camera
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;
}

// 🧠 Load ML Model
async function loadModel() {
  model = await cocoSsd.load();
  console.log("Model Loaded");
}

// 🚨 Block UI
function blockAccess() {
  if (blocked) return;
  blocked = true;

  document.getElementById("blocked").style.display = "flex";

  console.log("🚨 Phone detected → Blocking");

  // 🔔 (Optional backend alert)
  /*
  fetch("/api/detection/alert", {
    method: "POST",
    body: JSON.stringify({ type: "PHONE_DETECTED" })
  });
  */
}

// 🔍 Detection Loop
async function detectFrame() {
  if (!model) return;

  const predictions = await model.detect(video);

  predictions.forEach(p => {
    if (p.class === "cell phone" && p.score > 0.6) {
      blockAccess();
    }
  });
}

// 🔁 Run detection every 2 seconds
setInterval(detectFrame, 2000);

// 🚫 Disable right click
document.addEventListener("contextmenu", e => e.preventDefault());

// 🚫 Disable shortcuts
document.addEventListener("keydown", e => {
  if (e.key === "PrintScreen") blockAccess();
  if (e.ctrlKey && ["s", "p"].includes(e.key.toLowerCase())) {
    e.preventDefault();
  }
});

// 👁️ Blur on tab switch
document.addEventListener("visibilitychange", () => {
  if (document.hidden) blockAccess();
});

// 🚀 Init
(async () => {
  await startCamera();
  await loadModel();
})();
</script>

</body>
</html>
